<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Social Icons</title>
  <link rel="stylesheet" href="Icons.css">


  <!-- These icons are from the Font Awesome library.
  The
  <link> tag below loads the Font Awesome CSS from a CDN.
  Without this link, icons like Instagram, Facebook, or Home will NOT appear.
  If you want icons to work without an external link, you can:
  1. Use SVG icons directly in HTML
  2. Use image icons (PNG/JPG)
  3. Use locally downloaded Font Awesome files -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

  <div class="social-container">

    <!-- Home -->
    <div class="item">
      <a href="#" class="icon home">
        <i class="fa-solid fa-house"></i>
      </a>
      <div class="label">Home</div>
    </div>

    <!-- Instagram -->
    <div class="item">
      <a href="#" class="icon instagram">
        <i class="fa-brands fa-instagram"></i>
      </a>
      <div class="label">Instagram</div>
    </div>

    <!-- Facebook -->
    <div class="item">
      <a href="#" class="icon facebook">
        <i class="fa-brands fa-facebook-f"></i>
      </a>
      <div class="label">Facebook</div>
    </div>

    <!-- WhatsApp -->
    <div class="item">
      <a href="#" class="icon whatsapp">
        <i class="fa-brands fa-whatsapp"></i>
      </a>
      <div class="label">WhatsApp</div>
    </div>

    <!-- LinkedIn -->
    <div class="item">
      <a href="#" class="icon linkedin">
        <i class="fa-brands fa-linkedin-in"></i>
      </a>
      <div class="label">LinkedIn</div>
    </div>

    <!-- Gmail -->
    <div class="item">
      <a href="#" class="icon gmail">
        <i class="fa-solid fa-envelope"></i>
      </a>
      <div class="label">Gmail</div>
    </div>


    <!-- Contact -->
    <div class="item">
      <a href="#" class="icon contact">
        <i class="fa-solid fa-phone"></i>
      </a>
      <div class="label">Contact</div>
    </div>

  </div>

</body>

</html>
