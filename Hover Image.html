<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Hover Effects</title>
<link rel="stylesheet" href="Hover Image.css">

<style>

</style>
</head>

<body>

<h1>Modern Image Hover Effects</h1>

<div class="section">
    <h2>Fade in Box</h2>
    <div class="grid">
        <div class="container fade-box">
            <img src="Images/Green Forest.jpg" alt="Forest">
            <div class="middle">
                <div class="text">The forest is nature’s quiet sanctuary.</div>
            </div>
        </div>
    </div>
</div>

<div class="section">
    <h2>Fade Overlay</h2>
    <div class="grid">
        <div class="container overlay-effect">
            <img src="Images/mountains.jpg" alt="Mountains">
            <div class="overlay">
                <div class="text">Mountains inspire peace and strength.</div>
            </div>
        </div>
    </div>
</div>

<div class="section">
    <h2>Slide from Left</h2>
    <div class="grid">
        <div class="container slide-effect">
            <img src="Images/Desert.jpg" alt="Desert">
            <div class="slide-overlay">
                <div class="text">The desert reflects silence and resilience.</div>
            </div>
        </div>
    </div>
</div>


<div class="section">
    <h2>3D Flip Card</h2>
    <div class="grid">
        <div class="card-3d">
            <img src="Images/mountains.jpg" alt="Mountains">
            <div class="content">
                <p>Mountains stand tall as nature’s silent guardians, touching the sky and inspiring peace.</p>
            </div>
        </div>
    </div>
</div>

</body>
</html>
